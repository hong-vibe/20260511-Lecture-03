<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Scanner</title>
  <!-- CSS 파일 연결 -->
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js 라이브러리 추가 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>GitHub Scanner</h1>
      
      <!-- 1. 검색어 입력창 & 2. 검색 버튼 -->
      <div class="search-box">
        <!-- 번역 토글 버튼 (지원 브라우저에서만 JS가 보이게 함) -->
        <button id="translateHintBtn" class="lang-btn hidden" title="카드 설명을 한글로 번역합니다">🌐 번역</button>
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (예: javascript)">
        <button id="searchButton">검색</button>
      </div>
    </header>

    <main>
      <!-- 3. 상태 메시지 영역 (단순화된 구조) -->
      <div id="statusMessage" class="status-message">💡 검색어를 입력하거나 키워드를 클릭해서 검색하세요</div>

      <!-- 4. 저장소 카드 목록을 보여줄 영역 -->
      <div id="repoList" class="repo-list">
        <!-- 자바스크립트를 통해 이곳에 카드들이 추가될 예정입니다. -->
      </div>

      <!-- 5. GitHub 인기 트렌드 섹션 -->
      <section class="trending-section">
        <hr class="divider">
        <h2>🔥 실시간 인기 개발 키워드 TOP 10</h2>
        <p class="trend-subtitle">4주간 개발 생태계 키워드 순위 변동 추이 (GitHub Stars 기반)</p>
        <div class="trending-container">
          <!-- 전체 너비 그래프 영역 -->
          <div class="chart-area">
            <canvas id="rankChart"></canvas>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- JavaScript 파일 연결 -->
  <script src="app.js"></script>
</body>
</html>
